<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Varddhaa Studios — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;1,200&family=Lato:wght@100;300&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;background:#0d0b09}

    .page{
      height:100vh;
      display:grid;
      grid-template-columns:1fr 1fr;
      position:relative;
    }

    /* Left panel — deep warm black */
    .left{
      background:#0d0b09;
      display:flex;flex-direction:column;
      justify-content:flex-end;
      padding:8vh 6vw 10vh 8vw;
      position:relative;
      opacity:0;
      animation:slideRight 1.3s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
    }

    /* Thin vertical accent line */
    .left::after{
      content:'';
      position:absolute;right:0;top:15%;height:70%;width:1px;
      background:linear-gradient(to bottom, transparent, rgba(196,160,110,0.2), transparent);
    }

    .studio-name{
      font-family:'Lato',sans-serif;
      font-weight:100;
      font-size:0.52rem;
      text-transform:uppercase;
      letter-spacing:0.55em;
      color:rgba(196,160,110,0.5);
      margin-bottom:2.5rem;
    }

    .big-text{
      font-family:'Cormorant Garamond',serif;
      font-weight:200;
      font-style:italic;
      font-size:clamp(2.8rem,6vw,5.5rem);
      line-height:1.0;
      color:rgba(235,225,210,0.82);
      letter-spacing:-0.01em;
    }

    .big-text span{
      display:block;
      font-style:normal;
      font-weight:300;
      font-size:0.22em;
      letter-spacing:0.45em;
      color:rgba(196,160,110,0.55);
      margin-bottom:0.8rem;
      font-family:'Lato',sans-serif;
      text-transform:uppercase;
    }

    .socials{
      margin-top:3rem;
      display:flex;gap:1.6rem;
    }
    .socials a{color:rgba(196,160,110,0.28);text-decoration:none;transition:color .3s;display:flex;align-items:center}
    .socials a:hover{color:rgba(196,160,110,0.8)}
    .socials svg{width:16px;height:16px;fill:currentColor}

    /* Right panel — logo */
    .right{
      display:flex;align-items:center;justify-content:center;
      background:#0d0b09;
      opacity:0;
      animation:slideLeft 1.3s cubic-bezier(0.22,1,0.36,1) 0.25s forwards;
    }

    .logo-wrap img{
      width:clamp(200px,28vw,360px);
      display:block;
    }

    /* Top bar */
    .topbar{
      position:fixed;top:0;left:0;right:0;
      padding:1.8rem 2.8rem;
      display:flex;justify-content:space-between;align-items:center;
      z-index:10;
      opacity:0;
      animation:fadeIn .8s ease 1s forwards;
    }

    .dot-wrap{display:flex;align-items:center;gap:.55rem}
    .dot{width:5px;height:5px;border-radius:50%;background:rgba(196,160,110,0.55);animation:pulse 2.4s ease-in-out infinite}
    .dot-label{font-family:'Lato',sans-serif;font-weight:100;font-size:.48rem;text-transform:uppercase;letter-spacing:.48em;color:rgba(196,160,110,0.38)}

    @keyframes slideRight{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
    @keyframes slideLeft{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.15}}

    @media(max-width:640px){
      .page{grid-template-columns:1fr;grid-template-rows:auto auto}
      .left{padding:4rem 2rem 2rem;align-items:center;text-align:center}
      .right{padding:2rem 2rem 4rem}
      .left::after{display:none}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <span class="dot-label">Varddhaa Studios</span>
    <span class="dot-wrap"><span class="dot"></span><span class="dot-label">Coming Soon</span></span>
  </header>

  <main class="page">
    <div class="left">
      <p class="studio-name">Est. 2026</p>
      <h1 class="big-text">
        <span>A new chapter</span>
        Coming<br/>soon.
      </h1>

        </a>
      </div>
    </div>
    <div class="right">
      <div class="logo-wrap">
        <img src="final-logo-07.png" alt="Varddhaa Studios"/>
      </div>
    </div>
  </main>
</body>
</html>
