<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Varddhaa Studios — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,200;1,300&family=Lato:wght@100;300&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;background:#f0e8dc;font-family:'Lato',sans-serif}

    /* Soft vignette inward */
    body::before{
      content:'';position:fixed;inset:0;
      background:radial-gradient(ellipse 90% 90% at 50% 50%, transparent 45%, rgba(107,58,42,0.07) 100%);
      pointer-events:none;
    }

    /* Sand circle — bottom left, echoing the rate card */
    .deco-bl{
      position:fixed;bottom:-80px;left:-80px;
      width:280px;height:280px;border-radius:50%;
      background:#c8a882;opacity:0.28;
      pointer-events:none;
    }

    /* Smaller circle — top right */
    .deco-tr{
      position:fixed;top:-60px;right:-60px;
      width:200px;height:200px;border-radius:50%;
      /* background:#c8a882;opacity:0.18; */
      background:#9C7565;opacity:0.18;
      pointer-events:none;
    }

    .page{
      height:100vh;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      position:relative;z-index:1;
      padding:2rem;
    }

    /* Logo */
    .logo-wrap{
      opacity:0;
      animation:fadeUp 1.4s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
    }
    .logo-wrap img{
      width:clamp(220px,40vw,420px);
      display:block;
      /* Shift cream-on-black logo to warm brown on cream bg */
      filter:invert(1) sepia(1) saturate(0.6) hue-rotate(340deg) brightness(0.52);
    }

    /* Divider */
    .divider{
      width:1px;height:44px;
      background:linear-gradient(to bottom, transparent, rgba(107,58,42,0.25), transparent);
      margin:2.4rem 0 2rem;
      opacity:0;
      animation:fadeUp 1.1s cubic-bezier(0.22,1,0.36,1) 0.65s forwards;
    }

    /* Text block */
    .text-block{
      display:flex;flex-direction:column;align-items:center;gap:1rem;
      opacity:0;
      animation:fadeUp 1.1s cubic-bezier(0.22,1,0.36,1) 0.85s forwards;
    }

    .tagline{
      font-family:'Cormorant Garamond',serif;
      font-style:italic;font-weight:300;
      font-size:clamp(1.27rem,2.4vw,1.65rem);
      color:rgba(107,58,42);
      /* color:rgba(107,58,42,0.6); */
      letter-spacing:0.05em;
      text-align:center;
    }

    .soon{
      font-weight:100;font-size:0.54rem;
      text-transform:uppercase;letter-spacing:0.55em;
      color:rgba(160,112,90,0.65);
    }

    /* Socials */
    .socials{
      margin-top:0.8rem;
      display:flex;gap:2rem;
    }
    .socials a{
      color:rgba(107,58,42,0.28);
      text-decoration:none;
      transition:color .3s ease;
      display:flex;align-items:center;
    }
    .socials a:hover{color:rgba(107,58,42,0.65)}
    .socials svg{width:16px;height:16px;fill:currentColor}

    /* Corner marks in terracotta */
    .c{position:fixed;width:18px;height:18px;opacity:0.2}
    .c--tl{top:1.8rem;left:1.8rem;border-top:1px solid #7d3f2e;border-left:1px solid #7d3f2e}
    .c--tr{top:1.8rem;right:1.8rem;border-top:1px solid #7d3f2e;border-right:1px solid #7d3f2e}
    .c--bl{bottom:1.8rem;left:1.8rem;border-bottom:1px solid #7d3f2e;border-left:1px solid #7d3f2e}
    .c--br{bottom:1.8rem;right:1.8rem;border-bottom:1px solid #7d3f2e;border-right:1px solid #7d3f2e}

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(18px)}
      to{opacity:1;transform:translateY(0)}
    }
  </style>
</head>
<body>
  <div class="deco-bl"></div>
  <div class="deco-tr"></div>
  <div class="c c--tl"></div><div class="c c--tr"></div>
  <div class="c c--bl"></div><div class="c c--br"></div>
