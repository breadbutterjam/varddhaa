<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Varddhaa Studios — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;1,200;1,300&family=Lato:wght@100;300&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}

    /* Terracotta scene background */
    .scene{position:fixed;inset:0;background-color:#8B4A2F}
    .scene::before{
      content:'';position:absolute;inset:0;
      background:
        radial-gradient(ellipse 120% 80% at 70% 110%, #6B3420 0%, transparent 55%),
        radial-gradient(ellipse 80% 60% at -10% 30%, #A05535 0%, transparent 50%),
        radial-gradient(ellipse 60% 80% at 110% 10%, #7A3D25 0%, transparent 55%),
        radial-gradient(ellipse 100% 50% at 50% 0%, #9C4C30 0%, transparent 60%);
    }
    .scene::after{
      content:'';position:absolute;inset:0;
      background-image:
        repeating-linear-gradient(87deg,transparent,transparent 2px,rgba(0,0,0,.012) 2px,rgba(0,0,0,.012) 3px),
        repeating-linear-gradient(3deg,transparent,transparent 4px,rgba(0,0,0,.008) 4px,rgba(0,0,0,.008) 5px);
    }
    .orb{position:absolute;top:-18vw;right:-8vw;width:42vw;height:42vw;border-radius:50%;background:radial-gradient(circle at 35% 35%,#7A3B23,#5C2915);box-shadow:inset -20px 20px 60px rgba(0,0,0,.25)}
    .sweep{position:absolute;bottom:-5vw;left:-15vw;width:55vw;height:90vh;background:linear-gradient(145deg,#A05535 0%,#7A3A22 60%,transparent 100%);border-radius:0 60% 60% 0;opacity:.5;transform:rotate(-8deg)}

    /* Arch panel */
    .arch{
      position:fixed;left:50%;top:50%;
      transform:translate(-50%,-50%);
      width:clamp(280px,38vw,500px);
      height:clamp(340px,55vh,600px);
      border-radius:50% 50% 6px 6px / 36% 36% 6px 6px;
      background:rgba(255,240,225,0.09);
      backdrop-filter:blur(22px) saturate(1.3);
      -webkit-backdrop-filter:blur(22px) saturate(1.3);
      border:1px solid rgba(255,235,210,0.18);
      box-shadow:inset 0 1px 0 rgba(255,240,220,.25),0 24px 80px rgba(40,15,5,.35);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;
      opacity:0;
      animation:panelReveal 1.6s cubic-bezier(0.22,1,0.36,1) .3s forwards;
    }
    @keyframes panelReveal{from{opacity:0;transform:translate(-50%,calc(-50% + 32px))}to{opacity:1;transform:translate(-50%,-50%)}}

    .logo-wrap{opacity:0;animation:fadeUp 1.2s cubic-bezier(0.22,1,0.36,1) .9s forwards}
    .logo-wrap img{width:clamp(160px,22vw,290px);display:block}

    .rule{width:36px;height:1px;background:rgba(240,220,195,.4);opacity:0;animation:fadeUp 1s ease 1.1s forwards}

    .tagline{
      font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
      font-size:clamp(1rem,2vw,1.4rem);
      color:rgba(245,230,210,.82);letter-spacing:.05em;text-align:center;
      padding:0 2rem;line-height:1.5;
      opacity:0;animation:fadeUp 1s ease 1.2s forwards;
    }
    .soon{
      font-family:'Lato',sans-serif;font-weight:100;font-size:.56rem;
      text-transform:uppercase;letter-spacing:.52em;
      color:rgba(215,180,145,.65);
      opacity:0;animation:fadeUp 1s ease 1.35s forwards;
    }
    .socials{display:flex;gap:1.8rem;margin-top:.3rem;opacity:0;animation:fadeUp 1s ease 1.5s forwards}
    .socials a{color:rgba(230,205,175,.4);text-decoration:none;transition:color .3s;display:flex;align-items:center}
    .socials a:hover{color:rgba(230,205,175,.88)}
    .socials svg{width:16px;height:16px;fill:currentColor}

    .label{position:fixed;top:1.8rem;font-family:'Lato',sans-serif;font-weight:300;font-size:.5rem;text-transform:uppercase;letter-spacing:.52em;color:rgba(240,215,185,.28);opacity:0;animation:fadeIn 1.2s ease 1.6s forwards}
    .label--l{left:2.4rem}.label--r{right:2.4rem}

    .status{position:fixed;bottom:1.8rem;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:.6rem;font-family:'Lato',sans-serif;font-weight:100;font-size:.48rem;text-transform:uppercase;letter-spacing:.5em;color:rgba(215,180,145,.38);opacity:0;animation:fadeIn 1s ease 1.8s forwards;white-space:nowrap}
    .dot{width:4px;height:4px;border-radius:50%;background:rgba(215,180,145,.55);animation:blink 2.5s ease-in-out infinite;flex-shrink:0}

    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
  </style>
</head>
<body>
  <div class="scene"><div class="orb"></div><div class="sweep"></div></div>
  <span class="label label--l">Varddhaa Studios</span>
  <span class="label label--r">Coming Soon</span>

  <div class="arch">
    <div class="logo-wrap"><img src="final-logo-05.png" alt="Varddhaa Studios"/></div>
    <div class="rule"></div>
    <p class="tagline">A new creative chapter<br/>is on its way.</p>
    <p class="soon">Coming Soon</p>
